{% extends 'base.html' %}

{% block content %}
  <div class="container py-5">
    <div class="auth-card">
      <div class="card">
        <div class="card-body p-4 p-md-5 text-center">
          <div class="empty-icon text-success mb-2"><i class="bi bi-envelope-check"></i></div>
          <h1 class="page-title h3 mb-2">{% block title %}Check your email{% endblock %}</h1>
          <p class="text-muted mb-4">If an account exists for that email address, a password reset link has been sent.</p>
          <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary">Back to login</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
