{% extends 'base.html' %}

{% block content %}

    <div class="auth-card">
      <div class="card">
        <div class="card-body p-4 p-md-5 text-center">
          <div class="empty-icon text-success mb-2"><i class="bi bi-check-circle"></i></div>

      </div>
    </div>

{% endblock %}
