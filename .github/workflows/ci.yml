name: CI

on:
  push:

jobs:
  checks:
    name: Checks and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: crypto_track
          POSTGRES_USER: crypto_track
          POSTGRES_PASSWORD: crypto_track
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crypto_track -d crypto_track"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key
      CSRF_TRUSTED_ORIGINS: http://localhost
      DATABASE_URI: postgres://crypto_track:crypto_track@localhost:5432/crypto_track
      COINGECKO_KEY: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check installed packages
        run: python -m pip check

      - name: Run pre-commit checks
        run: pre-commit run --all-files

      - name: Run Django system checks
        run: python manage.py check

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Create cache table
        run: python manage.py createcachetable

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: python manage.py test --noinput
