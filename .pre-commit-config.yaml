default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        name: ruff import sorting
        args: [--select, I, --fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: django-tests
        name: django tests
        entry: bash scripts/pre_push_tests.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
